global:
  name: pretrain-language-model-japanese-classical
  phase: train
  stage: pretrain-language
  workdir: workdir
  seed: ~

dataset:
  train: {
    roots: ['data/japanese_classical_language_train.tsv'],
    batch_size: 1024
  }
  test: {
    roots: ['data/japanese_classical_language_val.tsv'],
    batch_size: 1024
  }
  charset_path: data/japanese_classical_column_lmdb/charset_japanese_classical_column.txt
  num_workers: 2
  max_length: 40
  case_sensitive: False
  smooth_label: True
  smooth_factor: 0.1
  one_hot_y: True
  use_sm: False

training:
  epochs: 40
  show_iters: 50
  eval_iters: 3000
  save_iters: 3000

optimizer:
  type: Adam
  true_wd: False
  wd: 0.0
  bn_wd: False
  clip_grad: 20
  lr: 0.0001
  args: {
    betas: !!python/tuple [0.9, 0.999],
  }
  scheduler: {
    periods: [30, 10],
    gamma: 0.1,
  }

model:
  name: 'modules.model_language.BCNLanguage'
  language: {
    num_layers: 4,
    loss_weight: 1.,
    use_self_attn: False
  }
