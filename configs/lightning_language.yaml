defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  run:
    dir: .
  output_subdir: null

# 事前学習用の元設定ファイル
config_path: configs/pretrain_language_model.yaml
global: {}
dataset:
  train: {}
  test: {}
training: {}
optimizer:
  args: {}
  scheduler: {}
model:
  vision:
    checkpoint: null
  language:
    checkpoint: null
  fusion: {}
  transformer: {}
augmentation:
  geometry: {}
  deterioration: {}

trainer:
  accelerator: auto
  devices: auto
  precision: 32
  log_every_n_steps: 50
  max_epochs: null  # null の場合は元設定(training_epochs)を使用

runtime:
  attention_backend: auto
  compile_enabled: true
  compile_backend: inductor
  compile_mode: reduce-overhead
  compile_fullgraph: false
  compile_dynamic: false
  fullgraph_train: false
  fast_train_backend: auto

wandb:
  enable: true
  project: abinet-kuzushiji-language
  entity: null
  run_name: null
  mode: online
  tags: []
