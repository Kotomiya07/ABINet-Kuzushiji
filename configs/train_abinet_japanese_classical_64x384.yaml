global:
  name: train-abinet-japanese-classical-64x384
  phase: train
  stage: train-super
  workdir: workdir
  seed: ~

dataset:
  train: {
    roots: ['data/japanese_classical_column_lmdb/train'],
    batch_size: 64
  }
  test: {
    roots: ['data/japanese_classical_column_lmdb/val'],
    batch_size: 64
  }
  charset_path: data/japanese_classical_column_lmdb/charset_japanese_classical_column.txt
  num_workers: 8
  max_length: 40
  image_height: 64
  image_width: 384
  case_sensitive: False
  eval_case_sensitive: False
  data_aug: True
  multiscales: True
  pin_memory: True
  rotate_if_vertical: True
  rotate_direction: ccw
  smooth_label: False
  smooth_factor: 0.1
  one_hot_y: True
  use_sm: False

training:
  epochs: 10
  show_iters: 50
  eval_iters: 2000
  save_iters: 2000
  require_pretrained: True

optimizer:
  type: Adam
  true_wd: False
  wd: 0.0
  bn_wd: False
  clip_grad: 20
  lr: 0.0001
  args: {
    betas: !!python/tuple [0.9, 0.999],
  }
  scheduler: {
    periods: [6, 4],
    gamma: 0.1,
  }

model:
  name: 'modules.model_abinet_iter.ABINetIterModel'
  iter_size: 3
  ensemble: ''
  use_vision: False
  vision: {
    checkpoint: ~,
    loss_weight: 1.,
    attention: 'position',
    backbone: 'transformer',
    backbone_ln: 3,
    max_len: 2400,
    feat_h: 16,
    feat_w: 96,
    enc_with_vision: False,
    iter_size: 2,
    mask: False,
  }
  language: {
    checkpoint: ~,
    detach: False,
    loss_weight: 1.,
  }
  fusion: {
    vision_loss_weight: 1.,
    language_loss_weight: 1.,
  }
  transformer: {
    enc_layer_num: 4,
    dec_layer_num: 4,
    d_model: 512,
    d_feedforward: 2048,
    nhead: 8,
    dropout: 0.1,
  }
  model_eval: alignment
  k: 5
  eval_case_sensisitves: False
  backbone: 'resnet45'
  loss_weight: [1., 1.]

augmentation:
  color_jitter: [0.15, 0.15, 0.0, 0.0]
  color_jitter_p: 0.1
  geometry: {
    degrees: 3,
    translate: [0.0, 0.0],
    scale: [0.95, 1.05],
    shear: [2, 1],
  }
  geometry_distortion: 0.05
  geometry_p: 0.1
  deterioration: {
    var: 6,
    degrees: 2,
    factor: 2,
    p: 0.05,
  }
